name-template: 'CIA Compliance Manager $RESOLVED_VERSION'
tag-template: '$RESOLVED_VERSION'

# Categories match exactly with PR labels from labeler.yml
categories:
  - title: '🚀 New Features'
    labels:
      - 'feature'
      - 'enhancement'

  - title: '📈 Analytics & Data'
    labels:
      - 'analytics'
      - 'visualization'
      - 'database'

  - title: '🎨 UI/UX Improvements'
    labels:
      - 'ui'
      - 'design'
      - 'style'

  - title: '🏗️ Infrastructure & Performance'
    labels:
      - 'infrastructure'
      - 'performance'
      - 'build'
      - 'config'

  - title: '🔄 Code Quality & Refactoring'
    labels:
      - 'refactor'
      - 'testing'

  - title: '🔒 Security & Compliance'
    labels:
      - 'security'
      - 'compliance'
      - 'confidentiality'
      - 'integrity'
      - 'availability'

  - title: '📝 Documentation'
    labels:
      - 'documentation'

  - title: '📦 Dependencies'
    labels:
      - 'dependencies'
      - 'javascript'
      - 'github_actions'

  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'

  - title: '🧪 Test Coverage Improvements'
    labels:
      - 'test-coverage-impact'
      - 'needs-tests'
      - 'branches-coverage-impact'
      - 'function-coverage-impact'
      - 'high-coverage'

  - title: '🔍 Component Updates'
    labels:
      - 'component-radar'
      - 'component-dashboard'
      - 'component-security-level'
      - 'component-business-impact'
      - 'component-compliance'
      - 'component-cost'
      - 'component-security-summary'
      - 'component-value-creation'

  - title: '⚙️ Core Application Changes'
    labels:
      - 'core-app'
      - 'data-model'
      - 'critical-security-code'
      - 'critical-business-code'

change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&' # Escape characters for markdown


