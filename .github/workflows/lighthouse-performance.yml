name: Lighthouse Performance Test

on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to test (default is the GitHub Pages site)"
        required: true
        default: "https://hack23.github.io/cia-compliance-manager/"

# Restrict permissions to minimum required
permissions:
  contents: read

jobs:
  lighthouse:
    name: Lighthouse Test
    runs-on: ubuntu-26.04
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Audit URLs using Lighthouse
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v9
        with:
          urls: |
            ${{ github.event.inputs.url }}
          budgetPath: ./budget.json # test performance budgets
          uploadArtifacts: true # save results as an action artifacts
          temporaryPublicStorage: true # upload lighthouse report to the temporary storage
