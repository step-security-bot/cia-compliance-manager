ng&quot;:[],&quot;skipped&quot;:[],&quot;duration&quot;:2877,&quot;root&quot;:false,&quot;rootEmpty&quot;:false,&quot;_timeout&quot;:2000},{&quot;uuid&quot;:&quot;32b63ee2-fdf6-4dbd-8fe7-87f0a0202bfa&quot;,&quot;title&quot;:&quot;SecuritySummaryWidget - Accessibility&quot;,&quot;fullFile&quot;:&quot;&quot;,&quot;file&quot;:&quot;&quot;,&quot;beforeHooks&quot;:[],&quot;afterHooks&quot;:[],&quot;tests&quot;:[{&quot;title&quot;:&quot;should have accessible tab navigation with ARIA attributes&quot;,&quot;fullTitle&quot;:&quot;Accessibility - WCAG 2.1 AA Compliance SecuritySummaryWidget - Accessibility should have accessible tab navigation with ARIA attributes&quot;,&quot;timedOut&quot;:null,&quot;duration&quot;:708,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;context&quot;:null,&quot;code&quot;:&quot;// Check if widget exists, otherwise skip\ncy.get(&#x27;body&#x27;).then(($body) =&gt; {\n    if ($body.find(&#x27;[role=\&quot;tablist\&quot;]&#x27;).length &gt; 0) {\n        cy.get(&#x27;[role=\&quot;tablist\&quot;]&#x27;).first().within(() =&gt; {\n            // Verify tabs have proper ARIA attributes\n            cy.get(&#x27;[role=\&quot;tab\&quot;]&#x27;).each(($tab) =&gt; {\n                // Each tab should have aria-selected\n                cy.wrap($tab).should(&#x27;have.attr&#x27;, &#x27;aria-selected&#x27;);\n                // Each tab should control a panel\n                cy.wrap($tab).should(&#x27;have.attr&#x27;, &#x27;aria-controls&#x27;);\n            });\n            // Verify exactly one tab is selected\n            cy.get(&#x27;[role=\&quot;tab\&quot;][aria-selected=\&quot;true\&quot;]&#x27;).should(&#x27;have.length.at.least&#x27;, 1);\n        });\n        // Verify tab panels exist\n        cy.get(&#x27;[role=\&quot;tabpanel\&quot;]&#x27;).should(&#x27;exist&#x27;);\n    }\n    else {\n        cy.log(&#x27;No tab widgets found - skipping tab ertion\n        win.cspViolations =\n            () =&gt; cspViolations;\n    },\n});\ncy.ensureAppLoaded();\n// Wait a moment for any violations to be reported\ncy.wait(1000);\n// Verify no violations occurred during page load\ncy.window().then((win) =&gt; {\n    const violations = win.cspViolations();\n    expect(violations).to.equal(0, \&quot;No CSP violations detected\&quot;);\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;c92be339-84cb-47ee-9f7e-01cbdce8da43&quot;,&quot;parentUUID&quot;:&quot;f5c4607c-d433-4fc0-b6f5-ea01fb770a43&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false}],&quot;suites&quot;:[],&quot;passes&quot;:[&quot;d53faab8-1a26-4b73-a7dd-b4ffeb8c6185&quot;,&quot;c92be339-84cb-47ee-9f7e-01cbdce8da43&quot;],&quot;failures&quot;:[],&quot;pending&quot;:[],&quot;skipped&quot;:[],&quot;duration&quot;:2596,&quot;root&quot;:false,&quot;rootEmpty&quot;:false,&quot;_timeout&quot;:2000},{&quot;uuid&quot;:&quot;4287219f-0b3a-4c8b-9d89-7ca26deda5cb&quot;,&quot;title&quot;:&quot;ISMS Compliance Verification&quot;,&quot;fullFile&quot;:&quot;&quot;,&quot;file&quot;:&quot;&quot;,&quot;beforeHooks&quot;:[],&quot;afterHooks&quot;:[],&quot;tests&quot;:[{&quot;title&quot;:&quot;should meet Application Security Framework requirements&quot;,&quot;fullTitle&quot;:&quot;Security Headers ISMS Compliance Verification should meet Application Security Framework requirements&quot;,&quot;timedOut&quot;:null,&quot;duration&quot;:501,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;context&quot;:null,&quot;code&quot;:&quot;// Verify all security headers are present as per ISMS requirements\ncy.get(\&quot;head\&quot;)\n    .find(_support_constants__WEBPACK_IMPORTED_MODULE_0__.SECURITY_HEADER_SELECTORS.CSP)\n    .should(\&quot;exist\&quot;);\ncy.get(\&quot;head\&quot;)\n    .find(_support_constants__WEBPACK_IMPORTED_MODULE_0__.SECURITY_HEADER_SELECTORS.X_CONTENT_TYPE_OPTI
