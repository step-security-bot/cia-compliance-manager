:false,&quot;code&quot;:&quot;// Check for html lang attribute\ncy.get(&#x27;html&#x27;).should(&#x27;have.attr&#x27;, &#x27;lang&#x27;);\n// Verify document has a title\ncy.title().should(&#x27;not.be.empty&#x27;);&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;a72f0b74-c3a5-46b5-a8d3-7b0ea125ae14&quot;,&quot;parentUUID&quot;:&quot;02694aa2-24de-4507-b5b2-4fbfb0a7745d&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;should have proper landmark regions&quot;,&quot;fullTitle&quot;:&quot;Accessibility - WCAG 2.1 AA Compliance Page Structure and Landmarks should have proper landmark regions&quot;,&quot;duration&quot;:896,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;// Main content should be present\ncy.get(&#x27;body&#x27;).then(($body) =&gt; {\n    const hasMain = $body.find(&#x27;main, [role=\&quot;main\&quot;]&#x27;).length &gt; 0;\n    if (hasMain) {\n        cy.get(&#x27;main, [role=\&quot;main\&quot;]&#x27;).should(&#x27;exist&#x27;);\n        cy.log(&#x27;Found main landmark region&#x27;);\n    }\n    else {\n        // If no main element, at least check page rendered\n        cy.get(&#x27;body&#x27;).should(&#x27;not.be.empty&#x27;);\n        cy.log(&#x27;No main landmark - page rendered without main element&#x27;);\n    }\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;f388eb8c-8082-462c-9efa-bc94b3d68882&quot;,&quot;parentUUID&quot;:&quot;02694aa2-24de-4507-b5b2-4fbfb0a7745d&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;should have a logical heading hierarchy&quot;,&quot;fullTitle&quot;:&quot;Accessibility - WCAG 2.1 AA Compliance Page Structure and Landmarks should have a logical heading hierarchy&quot;,&quot;duration&quot;:783,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;// Check if any headings exist\ncy.get(&#x27;body&#x27;).then(($body) =&gt; {\n    const headings = $body.find(&#x27;h1, h2, h3, h4, h5, h6&#x27;);\n    if (headings.length &gt; 0) {\n        // Verify heading hierarchy follows WCAG guidelines\n        // - Should start with h1 (if present)\n        // - When increasing depth, should not skip levels (e.g., h1 to h3 is invalid)\n        // - Can decrease to any previous level (e.g., h4 back to h2 is valid)\n        const headingLevels = headings.toArray().map(h =&gt; parseInt(h.tagName.charAt(1)));\n        // Check if first heading is h1 (recommended but not required)\n        if (headingLevels[0] &gt; 1) {\n            cy.log(`Warning: First heading is h${headingLevels[0]}, recommend starting with h1`);\n        }\n        // Check for skipped levels when increasing depth\n        for (let i = 1; i &lt; headingLevels.length; i++) {\n            const prev = headingLevels[i - 1];\n            const curr = headingLevels[i];\n            const diff = curr - prev;\n            // Only validate when going deeper (increasing heading number)\n            if (diff &gt; 1) {\n                // This violates WCAG - you can&#x27;t skip heading levels going deeper\n                cy.log(`Warning: Heading hierarchy skips from h${prev} to h${curr} at index ${i}`);\n                // Don&#x27;t fail the test, just warn - allows for flexible page structures\n            }\n        }\n        cy.log(`Heading hierarchy check complete - found ${headingLevels.length} headings`);\n    }\n    else {\n        // Skip if no headings found (app may not have loaded)\n        cy.log(&#x27;No headings found - skipping hierarchy check&#x27;);\n    }\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;92b8418d-0949-41e4-9579-b5b89fed0386&quot;,&quot;parentUUID&quot;:&quot;02694aa2-24de-4507-b5b2-4fbfb0a7745d&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false}],&quot;suites&quot;:[],&quot;passes&quot;:[&quot (&#x27;Found ARIA regions with proper accessibility&#x27;);\n    }\n    else if (hasAriaAttrs) {\n        cy.get(&#x27;[aria-label], [aria-labelledby], [aria-describedby]&#x27;).should(&#x27;exist&#x27;);\n        cy.log(&#x27;Found elements with ARIA labels/descriptions&#x27;);\n    }\n    else {\n        cy.log(&#x27;No ARIA regions or labels found - page may be in loading state&#x27;);\n    }\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;1286fbd6-ee26-4109-9f73-762c0b326d27&quot;,&quot;parentUUID&quot;:&quot;f1438b8b-cc6f-4f4b-90ad-bd6548cecf2b&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;should announce dynamic changes to screen readers&quot;,&quot;fullTitle&quot;:&quot;Accessibility - WCAG 2.1 AA Compliance SecuritySummaryWidget - Accessibility should announce dynamic changes to screen readers&quot;,&quot;duration&quot;:851,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;// Check for live regions in the page\ncy.get(&#x27;body&#x27;).then(($body) =&gt; {\n    const hasLiveRegions = $body.find(&#x27;[aria-live], [role=\&quot;status\&quot;], [role=\&quot;alert\&quot;]&#x27;).length &gt; 0;\n    if (hasLiveRegions) {\n        cy.get(&#x27;[aria-live], [role=\&quot;status\&quot;], [role=\&quot;alert\&quot;]&#x27;).should(&#x27;exist&#x27;);\n    }\n    else {\n        cy.log(&#x27;No live regions found - may not be needed for current page state&#x27;);\n    }\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;af559926-4a19-4e1b-ad76-0a29777ba60c&quot;,&quot;parentUUID&quot;:&quot;f1438b8b-cc6f-4f4b-90ad-bd6548cecf2b&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;should hide decorative elements from screen readers&quot;,&quot;fullTitle&quot;:&quot;Accessibility - WCAG 2.1 AA Compliance SecuritySummaryWidget - Accessibility should hide decorative elements from screen re gt; {\n            const role = el.getAttribute(&#x27;role&#x27;);\n            // Verify role is a valid ARIA role (not exhaustive, but common ones)\n            const validRoles = [\n                &#x27;button&#x27;, &#x27;link&#x27;, &#x27;navigation&#x27;, &#x27;main&#x27;, &#x27;complementary&#x27;, &#x27;banner&#x27;,\n                &#x27;contentinfo&#x27;, &#x27;region&#x27;, &#x27;article&#x27;, &#x27;tab&#x27;, &#x27;tabpanel&#x27;, &#x27;tablist&#x27;,\n                &#x27;status&#x27;, &#x27;alert&#x27;, &#x27;dialog&#x27;, &#x27;menu&#x27;, &#x27;menuitem&#x27;, &#x27;list&#x27;, &#x27;listitem&#x27;,\n                &#x27;img&#x27;, &#x27;progressbar&#x27;, &#x27;checkbox&#x27;, &#x27;radio&#x27;, &#x27;textbox&#x27;, &#x27;group&#x27;, &#x27;search&#x27;,\n                &#x27;form&#x27;, &#x27;heading&#x27;, &#x27;row&#x27;, &#x27;cell&#x27;, &#x27;grid&#x27;, &#x27;gridcell&#x27;, &#x27;table&#x27;\n            ];\n            expect(validRoles, `Element with role=\&quot;${role}\&quot; should use valid ARIA role`).to.include(role);\n        });\n    }\n    else {\n        cy.log(&#x27;No ARIA roles found - may use native HTML semantics&#x27;);\n    }\n});&quot;,&quot;err&quot;:{},&quot;uuid&quot;:&quot;e179cbf9-53af-48f7-b4e6-2afe54ca4a35&quot;,&quot;parentUUID&quot;:&quot;301f4b32-357e-4991-9d73-0b5853fd55b1&quot;,&quot;isHook&quot;:false,&quot;skipped&quot;:false},{&quot;title&quot;:&quot;should have proper ARIA relationships&quot;,&quot;fullTitle&quot;:&quot;Accessibility - WCAG 2.1 AA Compliance ARIA - Proper Usage should have proper ARIA relationships&quot;,&quot;duration&quot;:719,&quot;state&quot;:&quot;passed&quot;,&quot;speed&quot;:&quot;fast&quot;,&quot;pass&quot;:true,&quot;fail&quot;:false,&quot;pending&quot;:false,&quot;code&quot;:&quot;cy.get(&#x27;body&#x27;).then(($body) =&gt; {\n    // Check aria-labelledby references\n    const labelledbyElements = $body.find(&#x27;[aria-labelledby]&#x27;);\n    if (labelledbyElements.length
